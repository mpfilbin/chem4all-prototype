name: Tests

on:
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2 libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install Python dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest
